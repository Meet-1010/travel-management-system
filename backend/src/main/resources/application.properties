# ============================================================
# Travel Management System - Application Configuration
# ============================================================

# Server
server.port=8081
spring.application.name=Travel Management System

# ============================================================
# DATABASE - MySQL
# IMPORTANT: Update username/password to match your MySQL setup
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/travel_management_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:meet@2004}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# JWT Configuration
# ============================================================
jwt.secret=${JWT_SECRET:tms_super_secret_key_32_chars_long_at_least_256_bits_secure}
jwt.expiration=86400000

# ============================================================
# File Upload (Receipt simulation)
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/receipts

# ============================================================
# CORS - Allow Angular dev server
# ============================================================
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200}

# Logging
logging.level.com.tms=DEBUG
logging.level.org.springframework.security=INFO
